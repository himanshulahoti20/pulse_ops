name: Publish to pub.dev

on:
  push:
    branches: [main]
    tags: ["v[0-9]+.[0-9]+.[0-9]+*"]

jobs:
  # ── Auto-tag when version is bumped on main ──────────────────────────────
  tag:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
          token: ${{ secrets.RELEASE_PAT }}

      - name: Tag if version bumped
        run: |
          NEW=$(grep '^version:' pubspec.yaml | sed 's/version: *//' | tr -d ' ')
          OLD=$(git show HEAD~1:pubspec.yaml 2>/dev/null | grep '^version:' | sed 's/version: *//' | tr -d ' ' || echo "")
          if [ -z "$NEW" ] || [ "$NEW" = "$OLD" ] || git rev-parse "v$NEW" >/dev/null 2>&1; then
            echo "Nothing to tag (version unchanged or tag already exists)"; exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v$NEW" -m "Release v$NEW"
          git push origin "v$NEW"

  # ── Run tests on every version tag ──────────────────────────────────────
  test:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter pub get
      - run: flutter analyze --no-fatal-infos
      - run: flutter test

  # ── Publish via the official dart-lang reusable workflow ─────────────────
  # This is the only reliable way to get OIDC working with pub.dev.
  # dart pub publish --force alone does not correctly exchange the token.
  publish:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      id-token: write
    uses: dart-lang/setup-dart/.github/workflows/publish.yml@v1
