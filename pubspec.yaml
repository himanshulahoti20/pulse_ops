name: pulse_ops
description: >-
  Flutter-native developer toolkit for in-app network inspection, cURL export,
  log sharing, shake-to-open, and crash diagnostics with breadcrumbs.
version: 1.1.1
homepage: https://github.com/himanshulahoti20/pulse_ops
repository: https://github.com/himanshulahoti20/pulse_ops
issue_tracker: https://github.com/himanshulahoti20/pulse_ops/issues
funding:
  - https://github.com/sponsors/himanshulahoti20

topics:
  - networking
  - debugging
  - inspector
  - crashlytics
  - developer-tools

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  dio: ^5.4.0
  flutter_riverpod: ^3.0.0
  intl: ">=0.19.0 <0.22.0"
  meta: ">=1.10.0 <2.0.0"
  sensors_plus: ^7.0.0
  share_plus: ^13.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  mocktail: ^1.0.3

flutter:
