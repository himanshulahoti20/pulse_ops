name: pulse_ops
description: >
  A modern, Flutter-native developer toolkit for in-app network inspection and
  crash diagnostics. Includes a beautiful dark-themed API inspector, Dio
  interceptor, cURL export, request retry, sanitization, and Firebase
  Crashlytics integration with rich breadcrumbs.
version: 1.0.0
homepage: https://github.com/himanshulahoti20/pulse_ops
repository: https://github.com/himanshulahoti20/pulse_ops
issue_tracker: https://github.com/himanshulahoti20/pulse_ops/issues
documentation: https://pub.dev/documentation/pulse_ops/latest/
funding:
  - https://github.com/sponsors/himanshulahoti20
  
topics:
  - networking
  - debugging
  - inspector
  - crashlytics
  - developer-tools

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  dio: ^5.4.0
  flutter_riverpod: ^2.5.1
  intl: ^0.19.0
  meta: ^1.10.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  mocktail: ^1.0.3

flutter:
